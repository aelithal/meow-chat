<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Meow Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <span class="auth-logo-text">Meow Chat</span>
    </div>

    <h1 class="auth-title">С возвращением</h1>
    <p class="auth-subtitle">Войдите, чтобы продолжить общение</p>

    <div class="alert alert-error" id="alert"></div>

    <div class="form-group">
      <label class="form-label" for="username">Имя пользователя</label>
      <input type="text" id="username" placeholder="username" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Пароль</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()" style="width:100%;justify-content:center;margin-top:0.5rem">
      Войти
    </button>

    <p class="auth-footer">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </p>
  </div>

  <script src="app.js"></script>
  <script>
    if (localStorage.getItem('token')) location.href = 'chat.html';

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const btn = document.getElementById('login-btn');
      const alert = document.getElementById('alert');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showAlert(alert, 'Заполните все поля', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Вхожу...';
      alert.classList.remove('show');

      try {
        const data = await api.login(username, password);
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('username', username);
        location.href = 'chat.html';
      } catch (e) {
        showAlert(alert, e.message || 'Неверные данные', 'error');
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }
  </script>
</body>
</html>
